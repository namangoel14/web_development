<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform in CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;     
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            background-color: lightseagreen;
        }
        .box {
            width: 400px;
            height: 400px;
            background-color: lightgray;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            border-radius: 10px;
            transition: all 2s ease-in-out;
        }
        .box:hover {
            font-size: 40px;
            /* transform: scale(2); */
            transform: translate(150px, 100px) rotate(360deg) scale(2) skew(30deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Box1</div>
    </div>
    
</body>
</html>
