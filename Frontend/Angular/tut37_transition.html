<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition in CSS</title>
    <style>
        body {
            background-color: black;
        }
        #box {
            background-color: red;
            height: 200px;
            width: 200px;
            display: flex;
            border: 2px solid black;
            justify-content: center;
            align-items: center;
            /* transition-property: background-color; */
            /* transition-duration: 4s; */
            /* transition-timing-function: ease-in-out; */
            /* transition-delay: 2s; */

            transition: all 1s ease-in-out 1s;

        }
        #box:hover {
            background-color: green;
            border-radius: 15px;
            width: 300px;
            height: 300px;
            font-size: 40px;
            font-weight: bold;
            opacity: 0.2;
        }
        h2:hover {
            background-color: green;
        }
    </style>
</head>
<body>
    <h2>This is Transition property in CSS</h2>
    <div class="container">
        <div id="box">Box1</div>
    </div>
    
</body>
</html>
